<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch 2 Wedding - Zero Gap Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --ns-red: #e60012;
            --off-white: #ffffff;
            --inner-grey: #1a1a1a;
            --case-depth: 22px;
            --gold: #d4af37;
        }

        body {
            background-color: #121212;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 2000px;
            user-select: none;
        }

        #scene {
            width: 300px;
            height: 450px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            transform: rotateX(-10deg) rotateY(20deg);
        }

        .game-box {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .face {
            position: absolute;
            box-sizing: border-box;
            background: var(--off-white);
            backface-visibility: hidden;
        }

        /* --- 1. 正面封面容器 (Z=0) --- */
        .face-front-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .open .face-front-container { transform: rotateY(-145deg); }

        .face-front-outside {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 2px 8px 8px 2px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .face-front-inside {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #f0f0f0;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            border-radius: 8px 2px 2px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ccc;
        }

        /* --- 2. 遊戲卡帶 (修正深度) --- */
        .cartridge {
            position: absolute;
            width: 180px;
            height: 120px;
            background: #222;
            left: 60px;
            top: 165px;
            border-radius: 6px;
            /* 將卡帶推向前方 Z=-5px，緊貼封面背後 */
            transform: translateZ(-5px); 
            transition: transform 0.6s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 6px;
            box-sizing: border-box;
            z-index: 10; 
            color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .open .cartridge {
            /* 彈出後大幅增加 Z 軸，避免跟封面重疊 */
            transform: translateZ(150px) translateY(-220px) scale(1.3) rotateX(-10deg);
        }

        /* --- 3. 厚度與底層 --- */
        .side { position: absolute; background: #e0e0e0; border: none; backface-visibility: visible; }
        .side-spine {
            width: var(--case-depth);
            height: 100%;
            background: var(--ns-red);
            left: 0;
            transform-origin: left;
            transform: rotateY(-90deg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 7px;
        }
        .side-right { 
            width: var(--case-depth); height: 100%; right: 0; 
            transform-origin: right; transform: rotateY(90deg); 
            background: #ddd; /* 模擬塑膠盒扣合處 */
        }
        .side-top { width: 100%; height: var(--case-depth); top: 0; transform-origin: top; transform: rotateX(90deg); }
        .side-bottom { width: 100%; height: var(--case-depth); bottom: 0; transform-origin: bottom; transform: rotateX(-90deg); }

        .face-back {
            width: 100%;
            height: 100%;
            background: #ffffff;
            transform: translateZ(calc(var(--case-depth) * -1)) rotateY(180deg);
            padding: 30px 15px;
            border-radius: 8px 2px 2px 8px;
            border: 1px solid #ddd;
        }

        /* 內盒槽 (擋住後面) */
        .face-inner-base {
            width: 100%;
            height: 100%;
            background: var(--inner-grey);
            transform: translateZ(calc(var(--case-depth) * -0.9));
            border-radius: 2px 8px 8px 2px;
        }

        /* --- 內容 --- */
        .banner { height: 60px; background: var(--ns-red); color: white; display: flex; align-items: center; padding: 0 15px; }
        .art { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .v2-label { width: 100%; height: 100%; background: linear-gradient(135deg, var(--ns-red), #900); border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin { width: 6px; height: 12px; background: var(--gold); margin: 0 2px; }
    </style>
</head>
<body>

    <div id="scene">
        <div class="game-box" id="box">
            
            <div class="face side side-spine">
                <div style="writing-mode: vertical-rl; letter-spacing: 1px;">WEDDING ADVENTURE 2026</div>
            </div>
            <div class="face side side-right"></div>
            <div class="face side side-top"></div>
            <div class="face side side-bottom"></div>

            <div class="face face-back">
                <div style="font-size: 8px; color: var(--ns-red); margin-bottom: 10px;">► MISSION</div>
                <div style="width: 100%; height: 100px; background: #222; border: 2px solid #000; margin-bottom: 10px;"></div>
                <div style="font-size: 7px; line-height: 2; color: #444;">
                    STAGE: 新店彭園 1F<br>
                    TIME : 06.27 12:00
                </div>
            </div>

            <div class="face face-inner-base"></div>

            <div class="cartridge">
                <div class="v2-label">
                    <div style="font-size: 9px; margin-bottom: 5px;">STAGE CLEAR</div>
                    <div style="font-size: 6px;">2026.06.27</div>
                </div>
                <div style="display: flex; justify-content: center; margin-top: 5px;">
                    <div class="pin"></div><div class="pin"></div><div class="pin"></div>
                </div>
            </div>

            <div class="face-front-container">
                <div class="face-front-outside">
                    <div class="banner">
                        <div style="font-size: 16px; border: 3px solid white; padding: 3px 6px; margin-right: 10px;">S</div>
                        <div style="font-size: 12px;">SWITCH 2</div>
                    </div>
                    <div class="art">
                        <div style="font-size: 16px; color: var(--ns-red); line-height: 1.4;">STAGE<br>CLEAR!</div>
                        <div style="font-size: 30px; margin-top: 10px;">🎮❤️💍</div>
                    </div>
                    <div style="position: absolute; bottom: 15px; left: 15px; width: 35px; height: 35px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px;">99</div>
                    <div style="position: absolute; bottom: 15px; right: 15px; width: 40px; height: 40px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 6px;">QR</div>
                </div>
                <div class="face-front-inside">
                    <div style="text-align: center; padding: 20px;">
                        <div style="font-size: 9px; color: var(--ns-red);">START GAME</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const box = document.getElementById('box');
        let isDragging = false, isOpened = false;
        let startX, startY, rotateX = -10, rotateY = 20, moveDist = 0;

        const startAction = (e) => {
            isDragging = true;
            startX = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            startY = e.pageY || (e.touches ? e.touches[0].pageY : 0);
            moveDist = 0;
            if(isOpened) isDragging = false;
        };

        const moveAction = (e) => {
            if (!isDragging) return;
            const x = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            const y = e.pageY || (e.touches ? e.touches[0].pageY : 0);
            const dx = x - startX, dy = y - startY;
            moveDist += Math.abs(dx) + Math.abs(dy);
            rotateY += dx * 0.5; rotateX -= dy * 0.5;
            rotateX = Math.max(-30, Math.min(30, rotateX));
            scene.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            startX = x; startY = y;
        };

        const endAction = () => { isDragging = false; if (moveDist < 10) toggleBox(); };

        function toggleBox() {
            isOpened = !isOpened;
            if (isOpened) {
                box.classList.add('open');
                rotateX = 0; rotateY = 20;
                scene.style.transform = `rotateX(0deg) rotateY(20deg)`;
            } else { box.classList.remove('open'); }
        }

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchstart', startAction, {passive: false});
        window.addEventListener('touchmove', moveAction, {passive: false});
        window.addEventListener('touchend', endAction);
    </script>
</body>
</html>
