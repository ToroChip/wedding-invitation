<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch 2 Wedding - Solid Box (Fixed 2.1)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ns-red: #e60012; 
            --ns-red-dark: #cc0010;
            --case-depth: 40px; 
            --box-w: 400px;
            --box-h: 600px;
            /* 預設彈出參數 (電腦版) */
            --cart-pop-y: -320px;
            --cart-scale: 1.4;
        }

        /* 手機版適配：縮減彈出距離與縮放 */
        @media (max-width: 600px) {
            :root {
                --box-w: 280px;  /* 縮小盒子寬度 */
                --box-h: 420px;  /* 縮小盒子高度 */
                --case-depth: 25px;
                --cart-pop-y: -160px; /* 彈出高度減半 */
                --cart-scale: 1.05;   /* 幾乎不放大，確保留在螢幕內 */
            }
            #scene {
                margin-top: 80px; /* 場景下移，預留上方彈出空間 */
                transform: rotateX(-10deg) rotateY(20deg) scale(0.9);
            }
        }

        body {
            background-color: #121212;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            perspective: 3500px; 
            user-select: none;
        }

        .pixel-font { font-family: 'Press Start 2P', cursive; }

        #scene {
            width: var(--box-w);
            height: var(--box-h);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            transform: rotateX(-10deg) rotateY(20deg);
        }

        .game-box {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .face {
            position: absolute;
            box-sizing: border-box;
            backface-visibility: hidden;
        }

        .face-front-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform-origin: left center;
            transform: translateZ(0px); 
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .open .face-front-container { transform: rotateY(-155deg) translateZ(0px); }

        .face-front-outside {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 0 12px 12px 0; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 2;
        }

        /* 內頁修正 (2.0版本核心) */
        .face-front-inside {
            position: absolute; 
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #e0e0e0; 
            box-sizing: border-box;
            transform: rotateY(180deg) translateZ(0.5px); 
            backface-visibility: hidden; 
            border-radius: 12px 0 0 12px;
            display: flex; 
            flex-direction: column;
            padding: 5% 10%; /* 改用百分比 padding 以適應不同大小 */
            box-shadow: inset 10px 0 30px rgba(0,0,0,0.1);
            z-index: 1;
        }

        .front-banner { height: 12%; background-color: var(--ns-red); display: flex; align-items: center; padding: 0 5%; color: white; }
        .front-art { flex: 1; background: radial-gradient(circle at center, #fff 0%, #f0f0f0 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5%; text-align: center; }

        /* 殼結構 */
        .side { position: absolute; background: var(--ns-red); border: none; backface-visibility: visible;}
        
        .side-spine {
            width: var(--case-depth); height: 100%;
            background: var(--ns-red);
            left: 0;
            transform-origin: right center;
            transform: translateX(calc(var(--case-depth) * -1)) rotateY(-90deg);
            display: flex; flex-direction: column; align-items: center; padding: 10% 0; color: white;
            box-shadow: inset -5px 0 15px rgba(0,0,0,0.2);
        }
        .spine-title {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
            flex-grow: 1;
            margin: 5% 0;
        }

        .side-right {
            width: var(--case-depth); height: 100%;
            right: 0;
            transform-origin: left center;
            transform: translateX(var(--case-depth)) rotateY(90deg);
            background: var(--ns-red-dark);
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.3);
        }
        .side-top {
            width: 100%; height: var(--case-depth);
            top: 0;
            transform-origin: top center;
            transform: rotateX(270deg);
            background: var(--ns-red);
        }
        .side-bottom {
            width: 100%; height: var(--case-depth);
            bottom: 0;
            transform-origin: bottom center;
            transform: rotateX(90deg);
            background: var(--ns-red-dark);
        }

        .face-back {
            width: 100%; height: 100%;
            background: var(--ns-red);
            transform: translateZ(calc(var(--case-depth) * -1)) rotateY(180deg);
            padding: 10% 8%;
            border-radius: 12px 0 0 12px;
            display: flex; flex-direction: column; color: white;
        }

        .screenshot-box { width: 100%; height: 18%; background: #1a1a1a; border: 3px solid #000; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #888; margin-bottom: 5%; box-shadow: 4px 4px 0px rgba(0,0,0,0.3); }

        .face-inner-base {
            width: 100%; height: 100%;
            background: #1a1a1a;
            transform: translateZ(calc(var(--case-depth) * -0.99));
            border-radius: 0 12px 12px 0;
        }

        .cartridge {
            position: absolute;
            width: 70%; height: 32%;
            background: #2a2a2a;
            left: 15%; top: 38%;
            border-radius: 10px;
            transform: translateZ(calc(var(--case-depth) * -0.8));
            transition: transform 0.6s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 3%; z-index: 10; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        /* 動態使用變數處理彈出 */
        .open .cartridge {
            transform: translateZ(300px) translateY(var(--cart-pop-y)) scale(var(--cart-scale)) rotateX(-5deg);
            z-index: 200;
        }
        .v2-label { width: 100%; height: 100%; background: linear-gradient(135deg, var(--ns-red) 0%, #a00000 100%); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }

        .inside-story {
            flex: 1;
            border: 2px dashed #aaa;
            border-radius: 8px;
            margin-top: 5%;
            padding: 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.5);
            font-size: clamp(10px, 3vw, 14px);
        }
    </style>
</head>
<body>

    <div id="scene">
        <div class="game-box" id="box">
            <div class="face side-spine">
                <div class="spine-logo pixel-font" style="font-size: 14px;">S2</div>
                <div class="spine-title pixel-font">WEDDING ADVENTURE</div>
                <div style="font-size: 8px; opacity: 0.8; margin-top: auto;">06.27</div>
            </div>
            
            <div class="face side side-right"></div>
            <div class="face side side-top"></div>
            <div class="face side side-bottom"></div>

            <div class="face face-back">
                <div class="pixel-font" style="font-size: 10px; margin-bottom: 10px;">► MULTIPLAYER</div>
                <div class="screenshot-box">Wedding Photo 01</div>
                <div style="font-size: 11px; line-height: 1.8;">
                    • 遊玩人數： 2 人<br>
                    • 儲存類型： 永久心動<br>
                    • 支援語言： 繁體中文
                </div>
            </div>

            <div class="face face-inner-base"></div>

            <div class="cartridge" id="cart">
                <div class="v2-label">
                    <div class="pixel-font" style="font-size: clamp(14px, 4vw, 20px);">START</div>
                    <div style="font-size: 12px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 20px; margin-top: 5px;">2026.06.27</div>
                </div>
            </div>

            <div class="face-front-container">
                <div class="face-front-outside">
                    <div class="front-banner">
                        <div class="pixel-font" style="font-size: 18px;">SWITCH 2</div>
                    </div>
                    <div class="front-art">
                        <div class="pixel-font" style="font-size: 20px; color: var(--ns-red);">STAGE CLEAR!</div>
                        <div style="font-size: 50px; margin: 15px 0;">🎮❤️💍</div>
                        <div style="font-size: 18px; font-weight: 900;">勇者 & 歌姬</div>
                    </div>
                </div>

                <div class="face-front-inside">
                    <div class="pixel-font" style="font-size: 16px; color: var(--ns-red); text-align: center;">PLAYER INFO</div>
                    <div class="inside-story">
                        <div style="color: #444; line-height: 1.6; text-align: center;">
                            <p><b>勇者 (Groom)</b><br>IT / System Admin</p>
                            <p><b>歌姬 (Bride)</b><br>Heroine</p>
                            <hr style="width: 100%; border: 0; border-top: 1px solid #ccc; margin: 5px 0;">
                            <p style="font-size: 11px;">冒險正式開始...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const box = document.getElementById('box');
        let isDragging = false, isOpened = false;
        let startX, startY, rotateX = -10, rotateY = 20, moveDist = 0;

        const startAction = (e) => {
            isDragging = true;
            startX = (e.pageX || e.touches?.[0].pageX);
            startY = (e.pageY || e.touches?.[0].pageY);
            moveDist = 0;
            if(isOpened) isDragging = false;
        };

        const moveAction = (e) => {
            if (!isDragging) return;
            const x = (e.pageX || e.touches?.[0].pageX);
            const y = (e.pageY || e.touches?.[0].pageY);
            const dx = x - startX, dy = y - startY;
            moveDist += Math.abs(dx) + Math.abs(dy);
            rotateY += dx * 0.5; rotateX -= dy * 0.5;
            rotateX = Math.max(-30, Math.min(30, rotateX));
            scene.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) ${window.innerWidth < 600 ? 'scale(0.9)' : ''}`;
            startX = x; startY = y;
        };

        const endAction = () => { isDragging = false; if (moveDist < 10) toggleBox(); };

        function toggleBox() {
            isOpened = !isOpened;
            if (isOpened) {
                box.classList.add('open');
                rotateX = 0; rotateY = 20;
                scene.style.transform = `rotateX(0deg) rotateY(20deg) ${window.innerWidth < 600 ? 'scale(0.9)' : ''}`;
            } else { box.classList.remove('open'); }
        }

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchstart', startAction, {passive: false});
        window.addEventListener('touchmove', moveAction, {passive: false});
        window.addEventListener('touchend', endAction);
    </script>
</body>
</html>
